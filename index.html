<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sift — prépa sons DJ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css">
<link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
<div class="pa" id="pa" tabindex="0">
  <div class="sb" id="nav">
    <div class="nav-brand"><i class="ti ti-filter" aria-hidden="true"></i><span>Sift</span></div>
    <div class="nv" data-view="home" title="Accueil"><i class="ti ti-home" aria-hidden="true"></i><span>Accueil</span></div>
    <div class="nv" data-view="revue" title="Revue"><i class="ti ti-headphones" aria-hidden="true"></i><span>Revue</span><span class="nav-badge" data-badge="revue"></span></div>
    <div class="nv" data-view="ecarts" title="Écartés / à re-sourcer"><i class="ti ti-alert-circle" aria-hidden="true"></i><span>Écartés</span></div>
    <div class="nv" data-view="journal" title="Journal des actions"><i class="ti ti-history" aria-hidden="true"></i><span>Journal</span></div>
    <div class="nv" data-view="biblio" title="Bibliothèque"><i class="ti ti-folders" aria-hidden="true"></i><span>Bibliothèque</span></div>
    <div class="nav-foot">
      <div class="nv-grp" data-grp="export">Export</div>
      <div class="nv nv-export" data-view="rkb" title="Rekordbox"><span class="nv-export-dot" aria-hidden="true"></span><span>Rekordbox</span></div>
      <div class="nv nv-export" data-view="cle" title="Formater une clé USB"><span class="nv-export-dot" aria-hidden="true"></span><span>Clé USB</span></div>
      <div class="nv" data-view="reglages" title="Réglages"><i class="ti ti-settings" aria-hidden="true"></i><span>Réglages</span></div>
    </div>
  </div>
  <div id="content" style="flex:1;min-width:0;display:flex"></div>
</div>
<script type="module" src="/frontend/main.ts"></script>
</body>
</html>
